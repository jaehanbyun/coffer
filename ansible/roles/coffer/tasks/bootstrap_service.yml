---
- name: Run the one-shot Coffer schema bootstrap
  become: true
  kolla_container:
    action: "start_container"
    common_options: "{{ docker_common_options }}"
    detach: false
    environment:
      KOLLA_BOOTSTRAP:
      KOLLA_CONFIG_STRATEGY: "{{ config_strategy }}"
    image: "{{ coffer_bootstrap_service.image }}"
    labels:
      BOOTSTRAP:
    name: "{{ coffer_bootstrap_service.container_name }}"
    restart_policy: oneshot
    volumes: >-
      {{
        coffer_bootstrap_service.volumes |
        reject('equalto', '') |
        list
      }}
  run_once: true
  delegate_to: "{{ groups[coffer_bootstrap_service.group][0] }}"
  no_log: true
