---
enable_coffer: true
enable_haproxy: true
enable_keepalived: false
enable_loadbalancer: true
enable_mariadb: false
enable_proxysql: false
enable_fluentd: false
enable_prometheus: false

kolla_base_distro: ubuntu
kolla_base_distro_version: noble
kolla_internal_vip_address: 127.0.0.2
kolla_external_vip_address: 127.0.0.2
kolla_same_external_internal_vip: true
kolla_internal_fqdn: registry.internal.example.test
kolla_external_fqdn: registry.example.test
kolla_enable_tls_external: true
kolla_enable_tls_internal: true
kolla_enable_tls_backend: true
kolla_verify_tls_backend: true
kolla_copy_ca_into_containers: true
haproxy_single_external_frontend: true
haproxy_single_external_frontend_public_port: "443"
api_interface_address: 127.0.0.1
openstack_service_workers: 1

coffer_deployment_profile: production
coffer_api_port: "18787"
coffer_edge_port: "18788"
coffer_registry_port: "18789"
coffer_rgw_endpoint: https://rgw.example.test:8443
coffer_rgw_bucket: coffer-stage3-contract
coffer_enable_reconcile: false
coffer_enable_metrics: false
coffer_manage_observability_overrides: true
coffer_config_controller_become: false

docker_registry: registry.bootstrap.example.test
docker_namespace: openstack.kolla
docker_registry_username: contract-user
docker_registry_password: contract-only-value
database_address: 127.0.0.1
database_port: "3306"
database_user: root
database_password: contract-only-value
keystone_admin_password: contract-only-value
haproxy_password: contract-only-value
openstack_cacert: /etc/ssl/certs/ca-certificates.crt
