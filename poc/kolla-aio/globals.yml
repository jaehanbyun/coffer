---
kolla_base_distro: "ubuntu"
openstack_release: "2026.1"
docker_registry: "quay.io"
docker_namespace: "openstack.kolla"

network_interface: "ens3"
api_interface: "ens3"
storage_interface: "ens3"
cluster_interface: "ens3"
neutron_external_interface: "ens4"
kolla_internal_vip_address: "192.168.122.203"
kolla_external_vip_address: "192.168.122.220"
kolla_external_fqdn: "192.168.122.220"
kolla_same_external_internal_vip: false
kolla_enable_tls_external: true
kolla_certificates_dir: "/etc/kolla/certificates-stage4"

enable_openstack_core: true
enable_haproxy: true
enable_keepalived: true
enable_horizon: false
enable_cinder: false
enable_swift: false

nova_compute_virt_type: "qemu"
openstack_logging_debug: false
update_keystone_service_user_passwords: false
